# Dashboard theme — scientific / paper-grade: a single muted accent, flat surfaces.
# primaryColor drives the active controls (radio, slider, focus ring, progress);
# kept restrained (muted slate-blue) so nothing reads as a colourful product UI.

[theme]
base = "light"
primaryColor = "#3A536B"            # muted slate-blue — single restrained accent
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8F9"
textColor = "#1A1A1A"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
