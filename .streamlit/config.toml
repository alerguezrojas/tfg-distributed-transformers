# Dashboard theme — MLflow-inspired: clean white, calm blue accent, light surfaces.

[theme]
base = "light"
primaryColor = "#2272B4"            # MLflow blue
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
textColor = "#1A1A1A"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
