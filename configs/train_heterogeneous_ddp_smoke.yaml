# Smoke test del DDP heterogéneo — vit_tiny, 2 epochs, subconjunto reducido.
#
# Objetivo: validar en hardware real (verode21 GPU + verode16/18 CPU) que la
# comunicación multi-nodo gloo, el reparto del HeterogeneousDistributedSampler,
# la sincronización de gradientes (all_reduce) y el eval (all_gather) funcionan,
# SIN gastar horas. Usa metadata_smoke.parquet (1600 train + 400 val).
#
# Antes de lanzar, generar el subconjunto en Verode:
#   uv run python scripts/make_smoke_subset.py \
#     --metadata ~/datasets/bigearthnet/metadata.parquet \
#     --out ~/datasets/bigearthnet/metadata_smoke.parquet \
#     --n-train 1600 --n-val 400
#
# Lanzar (ver guía paso a paso). Mismo patrón que el config completo pero
# con --config configs/train_heterogeneous_ddp_smoke.yaml

data:
  root: "/home/bejeque/alu0101317038/datasets/bigearthnet/BigEarthNet-S2"
  metadata: "/home/bejeque/alu0101317038/datasets/bigearthnet/metadata_smoke.parquet"
  num_workers: 0

model:
  name: "vit_tiny_patch16_224"
  pretrained: true
  num_classes: 19
  dropout: 0.1

training:
  epochs: 2
  lr: 0.0001
  lr_min: 0.000001
  weight_decay: 0.05
  warmup_epochs: 1          # < epochs para pasar el validator
  llrd_decay: 0.75
  grad_clip: 1.0
  label_smoothing: 0.0
  mixup_alpha: 0.0
  early_stopping_patience: 10
  log_batch_every: 5

distributed:
  backend: "gloo"
  ranks:
    - device: "cuda"        # rank 0: verode21 (V100)
      batch_size: 64
      compute_weight: 16
    - device: "cpu"         # rank 1: verode16/18 (CPU)
      batch_size: 4
      compute_weight: 1

checkpoint:
  dir: "checkpoints/verode"

output:
  env: "verode"
