# Configuración v3 Verode — BigEarthNet-S2 (V100-PCIE 32 GB)
# Mejoras sobre v2: label smoothing, mixup, regularización aumentada

data:
  root: "/home/bejeque/alu0101317038/datasets/bigearthnet/BigEarthNet-S2"
  metadata: "/home/bejeque/alu0101317038/datasets/bigearthnet/metadata.parquet"
  num_workers: 4

model:
  name: "vit_base_patch16_224"
  pretrained: true
  num_classes: 19
  dropout: 0.3              # 0.1 → 0.3: más regularización en la cabeza

training:
  epochs: 30
  batch_size: 64            # V100 32 GB soporta batch=64 cómodamente
  lr: 0.0001
  lr_min: 0.000001
  weight_decay: 0.1         # 0.05 → 0.1: regularización L2 más fuerte
  warmup_epochs: 5
  llrd_decay: 0.75
  grad_clip: 1.0
  early_stopping_patience: 10
  log_batch_every: 100

  # v3: técnicas anti-overfitting
  label_smoothing: 0.1      # suaviza etiquetas 0→0.05, 1→0.95
  mixup_alpha: 0.2          # mezcla pares de imágenes (prob=0.5 por batch)

checkpoint:
  dir: "checkpoints/verode"

output:
  env: "verode"
