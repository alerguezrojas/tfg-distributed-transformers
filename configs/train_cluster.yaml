data:
  root: "/home/bejeque/alu0101317038/datasets/bigearthnet/BigEarthNet-S2"
  metadata: "/home/bejeque/alu0101317038/datasets/bigearthnet/metadata.parquet"
  num_workers: 4

model:
  name: "vit_base_patch16_224"
  pretrained: true
  num_classes: 19

training:
  epochs: 30
  batch_size: 64
  lr: 0.0001
  lr_min: 0.000001
  weight_decay: 0.05
  warmup_epochs: 5
  llrd_decay: 0.75
  grad_clip: 1.0
  early_stopping_patience: 10
  log_batch_every: 100

checkpoint:
  dir: "checkpoints/verode"

output:
  env: "verode"  # "local" → logs/local/, plots/local/ | "verode" → logs/verode/, plots/verode/
