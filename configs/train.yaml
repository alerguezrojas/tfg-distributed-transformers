# Configuración de entrenamiento local - BigEarthNet-S2 (RTX 3060 Ti, 8 GB)

data:
  root: "/media/alejandro/SSD/datasets/bigearthnet/BigEarthNet-S2"
  metadata: "/media/alejandro/SSD/datasets/bigearthnet/metadata.parquet"
  num_workers: 4

model:
  name: "vit_base_patch16_224"
  pretrained: true
  num_classes: 19

training:
  epochs: 30
  batch_size: 32            # 64 OOM en RTX 3060 Ti (8 GB)
  lr: 0.0001                # OJO: no usar 1e-4, se parsea como string en YAML
  lr_min: 0.000001
  weight_decay: 0.05        # estándar AdamW+ViT (DeiT, timm recipes)
  warmup_epochs: 5          # LinearLR warmup antes del cosine decay
  llrd_decay: 0.75          # layer-wise LR decay para ViT; 0.0 = AdamW estándar
  grad_clip: 1.0            # max_norm para clip_grad_norm_
  early_stopping_patience: 10
  log_batch_every: 50       # DeepTracingDecorator / BatchMonitor: log cada N batches

checkpoint:
  dir: "checkpoints/local"

output:
  env: "local"
