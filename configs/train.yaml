# Configuración de entrenamiento - BigEarthNet-S2

data:
  root: "/media/alejandro/SSD/datasets/bigearthnet/BigEarthNet-S2"
  metadata: "/media/alejandro/SSD/datasets/bigearthnet/metadata.parquet"
  num_workers: 4

model:
  name: "vit_base_patch16_224"
  pretrained: true
  num_classes: 19

training:
  epochs: 30
  batch_size: 32          # 64 OOM en RTX 3060 Ti (8 GB); usar --batch-size 32
  lr: 0.0001              # OJO: no usar 1e-4, se parsea como string en YAML
  weight_decay: 0.0001
  log_batch_every: 50     # DeepTracingDecorator: log de tabla de capas cada N batches

checkpoint:
  dir: "checkpoints/single_gpu"
