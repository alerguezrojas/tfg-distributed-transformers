<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TFG · Distributed Transformers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">▚</div>
        <div class="brand-text">
          <strong>Distributed Transformers</strong>
          <span>BigEarthNet-S2 · TFG</span>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a data-view="overview" class="nav-item active"><span class="ic">◆</span> Overview</a>
        <a data-view="runs" class="nav-item"><span class="ic">▤</span> Runs</a>
        <a data-view="compare" class="nav-item"><span class="ic">⇄</span> Compare</a>
        <a data-view="feasibility" class="nav-item"><span class="ic">◇</span> Feasibility</a>
        <a data-view="dataset" class="nav-item"><span class="ic">▦</span> Dataset</a>
      </nav>
      <div class="sidebar-foot">
        <button id="themeToggle" class="theme-toggle" title="Toggle theme">
          <span class="t-light">☾ Dark</span><span class="t-dark">☀ Light</span>
        </button>
        <span class="gen" id="genStamp"></span>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Overview</h1>
          <p id="pageSub" class="sub"></p>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
